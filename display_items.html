<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Items</title>
    <link rel="stylesheet" href="display_item.css">
    <link href="https://fonts.googleapis.com/css2?family=Jacques+Francois+Shadow&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&display=swap" rel="stylesheet">
</head>

<body>
    <!-- header html code -->
    <header>
        <h2>E-Comerce Store</h2>
    </header>

    <main>
        <section class="container">
            <aside class="left">
                <div class="left_sujjestions">
                    <img src="introBG.jpg" alt="image">
                    <img src="introBG.jpg" alt="image">
                    <img src="introBG.jpg" alt="image">
                    <img src="introBG.jpg" alt="image">
                    <img src="introBG.jpg" alt="image">
                </div>
                <div class="item_image">
                    <img src="introBG3.jpg" alt="image">
                </div>
            </aside>
            <aside class="right">
                <div class="upper">
                    <h3>name</h3>
                    <p>discription</p>
                    <div class="rating">
                        <span>4.5</span>
                        <span>stars</span>
                        <span>(555)</span>
                    </div>
                    <p><strong>1k bought</strong> in past 1 month</p>
                </div>
                <div class="below">
                    <div class="price" id="price">price</div>
                    <div class="extra_info">extra information</div>
                    <div class="buttons">
                        <button id="addToCartBtn" class="btn">ADD TO CART</button>
                        <button id="buyBtn" class="btn">BUY</button>
                    </div>
                </div>
            </aside>
        </section>
    </main>
</body>

</html>
